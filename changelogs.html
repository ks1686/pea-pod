<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pea Pod Network — Changelogs tracking the development history of this site." />
    <meta name="theme-color" content="#16a34a" />

    <!-- Open Graph / Social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Changelogs — Pea Pod Network" />
    <meta property="og:description" content="Track the development &amp; progress of Pea Pod Network." />
    <meta property="og:image" content="https://ks1686.github.io/favicon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />

    <title>Changelogs — Pea Pod Network</title>
  </head>
  <body>
    <!-- Animated background blobs -->
    <div class="bg-decoration" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <!-- ========== Header ========== -->
    <header>
      <div class="container">
        <div class="logo-wrap">
          <span class="logo-icon" aria-hidden="true">🫛</span>
          <h1 class="site-title">Pea Pod Network</h1>
        </div>
        <p class="site-tagline">A cozy corner of the internet ✦ Powered by green energy &amp; good vibes</p>
      </div>
    </header>

    <!-- ========== Main Content ========== -->
    <main>
      <div class="container">

        <!-- Back to home -->
        <a class="nav-back" href="/" aria-label="Back to home">← Back to Home</a>

        <!-- Changelogs section -->
        <section class="section" aria-labelledby="changelog-heading">
          <div class="section-label" id="changelog-heading">
            <span>Changelogs</span>
          </div>

          <!-- Timeline list — populated by changelogs.js -->
          <div id="changelog-container" aria-live="polite" aria-label="Commit history">
            <div class="changelog-loading" id="changelog-loading">
              <div class="spinner" aria-hidden="true"></div>
              <p>Loading commits…</p>
            </div>
          </div>

          <!-- Load More -->
          <div class="load-more-wrap" id="load-more-wrap" hidden>
            <button class="btn-load-more" id="btn-load-more" type="button">
              Load more commits ↓
            </button>
          </div>
        </section>

      </div>
    </main>

    <!-- ========== Footer ========== -->
    <footer>
      <div class="container">
        <p>
          🫛 Pea Pod Network &mdash; hosted on
          <a href="https://pages.github.com" target="_blank" rel="noopener noreferrer">GitHub Pages</a>
          &amp; served via
          <a href="https://cloudflare.com" target="_blank" rel="noopener noreferrer">Cloudflare</a>
        </p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/changelogs.js"></script>
  </body>
</html>
